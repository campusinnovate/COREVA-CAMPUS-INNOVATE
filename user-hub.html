<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby Anggota - Campus Innovate</title>
    <link rel="icon" type="image/png" href="Logo Coreva removebg.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #0A3055;
            --primary-soft: #f0f4f8;
            --accent: #f59e0b;
            --accent-soft: #fffbeb;
            --bg: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --success: #10b981;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        html { scroll-behavior: smooth; }
        body {
            background: var(--bg); color: var(--text); min-height: 100vh;
            display: flex; flex-direction: column; -webkit-font-smoothing: antialiased;
        }
        ::selection { background: var(--accent-soft); color: var(--primary); }

        /* ── Page Transition Overlay ── */
        .page-transition {
            position: fixed; inset: 0; z-index: 99999;
            background: var(--primary);
            pointer-events: none; opacity: 0;
            transition: opacity 0.45s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .page-transition.active { opacity: 1; }

        /* ── Entrance Animation ── */
        .page-enter {
            animation: pageIn 0.6s cubic-bezier(0.25, 1, 0.5, 1) both;
        }
        @keyframes pageIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes shimmer {
            0% { background-position: -300px 0; }
            100% { background-position: 300px 0; }
        }

        /* ── Navbar ── */
        .hub-nav {
            padding: 16px 5%; display: flex; justify-content: space-between;
            align-items: center; background: var(--surface);
            border-bottom: 1px solid var(--border);
            animation: fadeUp 0.5s 0.1s both;
            position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(12px); background: rgba(255,255,255,0.85);
        }
        .logo {
            font-size: 1.25rem; font-weight: 800; color: var(--primary);
            display: flex; align-items: center; gap: 10px; letter-spacing: -0.3px;
        }
        .logo i { color: var(--accent); font-size: 1.1rem; }
        .logo span { color: var(--accent); }
        .hub-nav-right { display: flex; align-items: center; gap: 16px; }
        .user-badge {
            font-size: 0.8rem; color: var(--text-muted);
            background: var(--bg); padding: 6px 14px;
            border-radius: 20px; border: 1px solid var(--border);
            display: none; align-items: center; gap: 8px;
        }
        .btn-logout {
            background: none; border: 1px solid var(--border);
            color: var(--text-muted); padding: 8px 18px; border-radius: var(--radius-sm);
            font-weight: 500; font-size: 0.85rem; cursor: pointer;
            transition: all 0.25s; display: flex; align-items: center; gap: 8px;
        }
        .btn-logout:hover {
            border-color: #EF4444; color: #EF4444; background: #FEF2F2;
        }

        /* ── Main Container ── */
        .hub-container {
            flex: 1; padding: 48px 5% 60px;
            max-width: 820px; margin: 0 auto; width: 100%;
        }

        /* ── Hero ── */
        .hub-hero {
            text-align: center; margin-bottom: 40px;
            animation: fadeUp 0.5s 0.2s both;
        }
        .hub-avatar {
            width: 64px; height: 64px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #1e40af);
            color: white; display: inline-flex; align-items: center;
            justify-content: center; font-size: 1.5rem; font-weight: 700;
            margin-bottom: 16px; box-shadow: 0 4px 16px rgba(10,48,85,0.2);
        }
        .hub-hero h1 {
            font-size: 1.75rem; font-weight: 700; color: var(--text);
            margin-bottom: 6px; letter-spacing: -0.5px;
        }
        .hub-subtitle {
            color: var(--text-muted); font-size: 0.95rem;
        }

        /* ── Join Card ── */
        .join-card {
            background: var(--surface); border-radius: var(--radius-lg);
            padding: 28px 32px; box-shadow: var(--shadow-md);
            margin-bottom: 40px; border: 1px solid var(--border);
            animation: fadeUp 0.5s 0.3s both;
        }
        .join-card-header {
            display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
        }
        .join-card-header i {
            color: var(--accent); font-size: 1.1rem;
            width: 36px; height: 36px; border-radius: 10px;
            background: rgba(245,158,11,0.1); display: flex;
            align-items: center; justify-content: center;
        }
        .join-card-header h3 { font-size: 1rem; font-weight: 600; color: var(--text); }
        .join-note {
            font-size: 0.8rem; color: var(--text-muted); line-height: 1.5;
            margin-bottom: 16px; padding: 12px 16px;
            background: #FFFBEB; border-radius: var(--radius-sm);
            border-left: 3px solid var(--accent);
        }
        .join-note i { color: var(--accent); margin-right: 6px; }
        .input-group {
            display: flex; gap: 10px;
        }
        .input-group input {
            flex: 1; padding: 14px 16px; border: 1.5px solid var(--border);
            border-radius: var(--radius-sm); font-size: 0.9rem;
            outline: none; transition: border-color 0.2s;
            background: var(--bg);
        }
        .input-group input:focus { border-color: var(--accent); }
        .input-group input::placeholder { color: var(--text-muted); }
        .btn-join {
            background: var(--primary); color: white; padding: 0 28px;
            border: none; border-radius: var(--radius-sm); font-weight: 600;
            font-size: 0.9rem; cursor: pointer;
            transition: all 0.25s; white-space: nowrap;
        }
        .btn-join:hover { background: #072c4d; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(10,48,85,0.25); }
        .btn-join:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* ── Section Label ── */
        .section-label {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 16px; animation: fadeUp 0.5s 0.35s both;
        }
        .section-label i { color: var(--primary); font-size: 0.9rem; }
        .section-label span { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .count-badge {
            font-size: 0.7rem; background: var(--border); color: var(--text-muted);
            padding: 2px 10px; border-radius: 10px; font-weight: 600;
        }

        /* ── Workspace Grid ── */
        .projects-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        /* ── Skeleton Loading ── */
        .skeleton-card {
            height: 160px; border-radius: var(--radius-md);
            background: linear-gradient(90deg, #f1f5f9 25%, #e8ecf1 50%, #f1f5f9 75%);
            background-size: 300px 100%;
            animation: shimmer 1.5s ease-in-out infinite;
        }

        /* ── Card ── */
        .project-card {
            background: var(--surface); border-radius: var(--radius-md);
            padding: 24px; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            border: 1px solid var(--border);
            animation: fadeUp 0.5s both;
            position: relative; overflow: hidden;
        }
        .project-card::after {
            content: ''; position: absolute; inset: 0;
            border-radius: var(--radius-md);
            border: 1.5px solid transparent;
            transition: border-color 0.3s;
            pointer-events: none;
        }
        .project-card:hover {
            transform: translateY(-4px); box-shadow: var(--shadow-lg);
        }
        .project-card:hover::after { border-color: var(--accent); }
        .project-card:active { transform: translateY(-1px); }

        .p-icon {
            width: 44px; height: 44px; border-radius: 10px;
            background: rgba(10,48,85,0.08); color: var(--primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; margin-bottom: 14px;
            transition: background 0.3s;
        }
        .project-card:hover .p-icon { background: rgba(246,178,59,0.15); color: var(--accent); }
        .project-card h3 {
            font-size: 1rem; font-weight: 600; color: var(--text);
            margin-bottom: 4px;
        }
        .project-card p {
            color: var(--text-muted); font-size: 0.8rem; margin-bottom: 16px;
        }
        .p-action {
            color: var(--primary); font-weight: 600; font-size: 0.8rem;
            display: flex; align-items: center; gap: 6px;
            transition: gap 0.3s;
        }
        .project-card:hover .p-action { gap: 10px; }
        .p-action i { font-size: 0.7rem; transition: transform 0.3s; }
        .project-card:hover .p-action i { transform: translateX(3px); }

        /* ── Empty State ── */
        .empty-state {
            text-align: center; padding: 60px 20px;
            animation: fadeUp 0.5s 0.4s both;
        }
        .empty-state .empty-icon {
            width: 72px; height: 72px; border-radius: 50%;
            background: var(--bg); border: 2px dashed var(--border);
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 1.6rem; color: var(--text-muted); margin-bottom: 16px;
        }
        .empty-state h3 { font-size: 1.1rem; font-weight: 600; color: var(--text); margin-bottom: 6px; }
        .empty-state p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; max-width: 360px; margin: 0 auto; }

        /* ── Error State ── */
        .error-state {
            text-align: center; padding: 40px 20px;
            animation: fadeUp 0.5s both;
        }
        .error-state i { font-size: 2rem; color: #EF4444; margin-bottom: 12px; }
        .error-state p { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 16px; }
        .btn-retry {
            background: none; border: 1px solid var(--border);
            padding: 10px 24px; border-radius: var(--radius-sm);
            font-weight: 500; cursor: pointer; font-size: 0.85rem;
            transition: all 0.2s;
        }
        .btn-retry:hover { border-color: var(--primary); color: var(--primary); }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .hub-container { padding: 24px 5% 40px; }
            .hub-hero h1 { font-size: 1.35rem; }
            .join-card { padding: 20px; }
            .input-group { flex-direction: column; }
            .btn-join { padding: 14px; }
            .projects-grid { grid-template-columns: 1fr; }
            .user-badge { display: none !important; }
            .logo { font-size: 1.05rem; }
        }
    </style>
</head>
<body>

    <!-- Page Transition Overlay -->
    <div class="page-transition" id="pageTransition"></div>

    <!-- Navbar -->
    <nav class="hub-nav">
        <div class="logo">
            <i class="fa-solid fa-chart-pie"></i> Campus <span>Innovate</span>
        </div>
        <div class="hub-nav-right">
            <span class="user-badge" id="userBadge"><i class="fa-solid fa-user"></i> <span id="badgeName"></span></span>
            <button class="btn-logout" onclick="handleLogout()">
                <i class="fa-solid fa-right-from-bracket"></i> Keluar
            </button>
        </div>
    </nav>

    <!-- Main -->
    <main class="hub-container page-enter">

        <!-- Hero -->
        <div class="hub-hero">
            <div class="hub-avatar" id="hubAvatar"><span id="avatarInitial">?</span></div>
            <h1 id="userGreeting">Selamat datang</h1>
            <p class="hub-subtitle">Pilih organisasi atau masukkan kode undangan dari Admin</p>
        </div>

        <!-- Join Card -->
        <div class="join-card">
            <div class="join-card-header">
                <i class="fa-solid fa-link"></i>
                <h3>Gabung Organisasi</h3>
            </div>
            <div class="join-note">
                <i class="fa-solid fa-clock"></i>
                Masukkan kode undangan yang diberikan Admin. Jika belum memiliki kode, hubungi Admin organisasi Anda dan minta untuk diundang ke workspace.
            </div>
            <div class="input-group">
                <input type="text" id="inviteCode" placeholder="Masukkan kode workspace" autocomplete="off">
                <button class="btn-join" onclick="joinWorkspace()" id="btn-join-ws">Gabung</button>
            </div>
        </div>

        <!-- Section -->
        <div class="section-label">
            <i class="fa-solid fa-building-columns"></i>
            <span>Organisasi Saya</span>
            <span class="count-badge" id="wsCount">0</span>
        </div>

        <!-- Workspace List -->
        <div class="projects-grid" id="workspace-list">
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
        </div>

    </main>

    <script>
        // 1. SUPABASE
        const SUPABASE_URL = 'https://wnhftesxaicqffnyrdkn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_i2-_17x_KOh0HxNw4DaaNA_vqXMBO2R';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;

        document.addEventListener('DOMContentLoaded', async () => {
            // Auth check
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.href = 'index.html'; return; }

            currentUser = session.user;
            const name = currentUser.user_metadata?.full_name || currentUser.email.split('@')[0];
            const initial = (name.charAt(0) || '?').toUpperCase();

            document.getElementById('avatarInitial').textContent = initial;
            document.getElementById('badgeName').textContent = name;
            document.getElementById('userBadge').style.display = 'flex';
            document.getElementById('userGreeting').textContent = 'Hai, ' + name;

            // Page entrance: hide transition overlay
            const overlay = document.getElementById('pageTransition');
            overlay.classList.remove('active');

            // Load workspaces
            await loadMyWorkspaces();
        });

        // 2. GABUNG WORKSPACE
        async function joinWorkspace() {
            const code = document.getElementById('inviteCode').value.trim();
            if (!code) { alert('Masukkan kode terlebih dahulu!'); return; }

            const btn = document.getElementById('btn-join-ws');
            btn.textContent = '...'; btn.disabled = true;

            try {
                const { data: wsData, error: wsError } = await supabaseClient
                    .from('workspaces')
                    .select('id, nama_organisasi')
                    .eq('id', code)
                    .single();

                if (wsError || !wsData) {
                    alert('Kode tidak valid atau Ruang Kerja tidak ditemukan!');
                    btn.textContent = 'Gabung'; btn.disabled = false;
                    return;
                }

                const { error: joinError } = await supabaseClient
                    .from('workspace_members')
                    .insert([{ workspace_id: wsData.id, user_id: currentUser.id }]);

                if (joinError && joinError.code === '23505') {
                    alert('Anda sudah tergabung dalam Ruang Kerja ini.');
                } else if (joinError) {
                    alert('Gagal bergabung: ' + joinError.message);
                } else {
                    alert('Berhasil bergabung dengan ' + wsData.nama_organisasi + '!');
                    document.getElementById('inviteCode').value = '';
                    await loadMyWorkspaces();
                }
            } catch (err) {
                console.error(err);
                alert('Terjadi kesalahan sistem.');
            }

            btn.textContent = 'Gabung'; btn.disabled = false;
        }

        // 3. MUAT DAFTAR WORKSPACE
        async function loadMyWorkspaces() {
            const grid = document.getElementById('workspace-list');

            // Show skeletons
            grid.innerHTML =
                '<div class="skeleton-card"></div>' +
                '<div class="skeleton-card"></div>';

            const { data, error } = await supabaseClient
                .from('workspace_members')
                .select(`
                    workspace_id,
                    joined_at,
                    workspaces ( nama_organisasi )
                `)
                .eq('user_id', currentUser.id);

            document.getElementById('wsCount').textContent = data ? data.length : '0';

            if (error) {
                grid.innerHTML =
                    '<div class="error-state" style="grid-column:1/-1">' +
                    '<i class="fa-solid fa-circle-exclamation"></i>' +
                    '<p>Gagal memuat data: ' + error.message + '</p>' +
                    '<button class="btn-retry" onclick="loadMyWorkspaces()">Coba Lagi</button>' +
                    '</div>';
                return;
            }

            if (!data || data.length === 0) {
                grid.innerHTML =
                    '<div class="empty-state" style="grid-column:1/-1">' +
                    '<div class="empty-icon"><i class="fa-solid fa-inbox"></i></div>' +
                    '<h3>Belum Bergabung</h3>' +
                    '<p>Anda belum terdaftar di organisasi mana pun.<br>Masukkan kode undangan dari Admin untuk memulai.</p>' +
                    '</div>';
                return;
            }

            grid.innerHTML = '';
            data.forEach((item, i) => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.style.animationDelay = (0.1 + i * 0.08) + 's';
                card.onclick = () => goToDashboard(item.workspace_id);
                card.innerHTML =
                    '<div class="p-icon"><i class="fa-solid fa-building-columns"></i></div>' +
                    '<h3>' + escapeHtml(item.workspaces?.nama_organisasi || 'Tanpa Nama') + '</h3>' +
                    '<p>Bergabung: ' + new Date(item.joined_at).toLocaleDateString('id-ID', { year:'numeric', month:'long', day:'numeric' }) + '</p>' +
                    '<div class="p-action">Masuk <i class="fa-solid fa-arrow-right"></i></div>';
                grid.appendChild(card);
            });
        }

        // 4. NAVIGASI
        function goToDashboard(workspaceId) {
            const overlay = document.getElementById('pageTransition');
            overlay.classList.add('active');
            setTimeout(() => {
                window.location.href = 'user.html?workspace=' + workspaceId;
            }, 400);
        }

        async function handleLogout() {
            const overlay = document.getElementById('pageTransition');
            overlay.classList.add('active');
            await supabaseClient.auth.signOut();
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 300);
        }

        // 5. UTILS
        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }
    </script>

</body>
</html>
