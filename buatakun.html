<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Password - Campus Innovate</title>
    <link rel="icon" type="image/png" href="coreva_logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { 
            --primary: #0A3055; 
            --secondary: #F6B23B; 
            --bg: #eef2f6; 
            --text: #333; 
            --white: #fff;
            --error: #e74c3c;
            --success: #2ecc71;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, var(--bg) 0%, #d5e1ef 100%);
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow-x: hidden; 
        }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 15px; }
        .toast { 
            background: var(--white); border-left: 5px solid var(--primary); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 15px 20px; 
            border-radius: 8px; display: flex; align-items: center; gap: 15px; 
            min-width: 300px; transform: translateX(120%);
            animation: slideInToast 0.4s forwards, fadeOutToast 0.4s forwards 3.6s; 
        }
        .toast.error { border-left-color: var(--error); }
        .toast.success { border-left-color: var(--success); }
        .toast i { font-size: 1.2rem; }
        .toast.error i { color: var(--error); }
        .toast.success i { color: var(--success); }
        .toast-content { display: flex; flex-direction: column; }
        .toast-title { font-weight: 700; font-size: 0.9rem; color: var(--text); }
        .toast-message { font-size: 0.8rem; color: #666; }

        @keyframes slideInToast { to { transform: translateX(0); } }
        @keyframes fadeOutToast { to { opacity: 0; transform: translateY(-20px); visibility: hidden; } }

        .auth-container { 
            display: flex; width: 90%; max-width: 900px; min-height: 500px; 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            border-radius: 20px; box-shadow: 0 25px 50px rgba(10, 48, 85, 0.15); 
            overflow: hidden; margin: 40px 0;
        }
        
        .brand-panel { 
            flex: 1; background: linear-gradient(145deg, var(--primary), #1a497d); 
            color: white; padding: 50px; display: flex; flex-direction: column; 
            justify-content: center; position: relative; overflow: hidden;
            text-align: center;
        }
        .brand-panel h1 { font-size: 2.5rem; line-height: 1.2; margin-bottom: 15px; z-index: 2; position: relative;}
        .brand-panel h1 span { color: var(--secondary); }
        
        .floating-icon { font-size: 4rem; color: var(--secondary); margin-bottom: 20px; z-index: 2; position: relative; animation: float 3s ease-in-out infinite; filter: drop-shadow(0 15px 25px rgba(0,0,0,0.3)); }
        
        .form-panel { flex: 1.2; padding: 50px 40px; position: relative; display: flex; align-items: center; justify-content: center;}
        
        .form-wrapper { width: 100%; max-width: 400px; position: relative; z-index: 10;}
        .form-wrapper h2 { color: var(--primary); margin-bottom: 5px; font-size: 1.8rem; }
        .form-wrapper p.subtitle { color: #777; margin-bottom: 30px; font-size: 0.95rem; }
        
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #aaa; transition: 0.3s; }
        .input-group input { width: 100%; padding: 14px 15px 14px 50px; border: 2px solid #e1e8ed; border-radius: 12px; font-size: 0.95rem; outline: none; transition: 0.3s; background: #fafbfc;}
        .input-group input:focus { border-color: var(--secondary); background: white; box-shadow: 0 0 0 4px rgba(246, 178, 59, 0.1);}
        .input-group input:focus + i { color: var(--secondary); }

        .btn-primary { width: 100%; padding: 14px; background: var(--green); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 1rem; display: flex; justify-content: center; align-items: center; gap: 10px;}
        .btn-primary:hover { background: #27ae60; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(46, 204, 113, 0.3); }
        .btn-primary:disabled { background: #cbd5e1; color: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }
        
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }

        @media (max-width: 768px) {
            .auth-container { flex-direction: column; width: 95%; border-radius: 15px; }
            .brand-panel { padding: 40px 20px; border-radius: 15px 15px 0 0; }
            .form-panel { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div class="auth-container">
        <div class="brand-panel">
            <i class="fa-solid fa-shield-check floating-icon"></i>
            <h1>Verifikasi <br><span>Berhasil!</span></h1>
            <p style="z-index: 2; position: relative;">Satu langkah lagi. Silakan atur kata sandi untuk akun Anda agar dapat mengakses sistem Campus Innovate.</p>
        </div>

        <div class="form-panel">
            <div class="form-wrapper">
                <h2>Buat Kata Sandi 🔒</h2>
                <p class="subtitle" id="user-email-display">Menyiapkan pengaturan akun Anda...</p>
                <form onsubmit="handleSetPassword(event)">
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="new-password" placeholder="Kata Sandi Baru (Min. 6 Karakter)" required minlength="6">
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-key"></i>
                        <input type="password" id="confirm-password" placeholder="Konfirmasi Kata Sandi Baru" required minlength="6">
                    </div>

                    <button type="submit" class="btn-primary" id="btn-save">
                        <span id="btn-text">Simpan Kata Sandi & Masuk</span>
                        <i class="fa-solid fa-arrow-right-to-bracket" id="btn-icon"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://wnhftesxaicqffnyrdkn.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_i2-_17x_KOh0HxNw4DaaNA_vqXMBO2R'; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function showToast(title, message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            let icon = type === 'error' ? 'fa-circle-exclamation' : 'fa-check-circle';
            toast.innerHTML = `<i class="fa-solid ${icon}"></i><div class="toast-content"><span class="toast-title">${title}</span><span class="toast-message">${message}</span></div>`;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 4000);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            // Ketika user klik link dari email OTP, Supabase otomatis memvalidasi hash di URL
            // dan langsung mengaktifkan session pengguna.
            
            // Cek apakah ada session aktif hasil dari klik link email
            const { data: { session } } = await supabaseClient.auth.getSession();
            
            if (session && session.user) {
                document.getElementById('user-email-display').innerHTML = `Terkoneksi sebagai: <b>${session.user.email}</b>`;
            } else {
                // Jika tidak ada session (link expired / dibuka manual tanpa token)
                const hash = window.location.hash;
                if (hash && hash.includes("error=access_denied")) {
                    showToast("Link Tidak Valid", "Link verifikasi telah kedaluwarsa atau tidak valid. Silakan hubungi admin.", "error");
                    document.getElementById('user-email-display').innerHTML = `<span style="color:var(--error);">Link kedaluwarsa. Silakan kembali ke halaman login.</span>`;
                    document.getElementById('btn-save').disabled = true;
                } else {
                    // Tunggu sesaat karena terkadang auth listener butuh waktu parse hash URL
                    supabaseClient.auth.onAuthStateChange((event, newSession) => {
                        if (event === 'SIGNED_IN' || event === 'PASSWORD_RECOVERY') {
                            document.getElementById('user-email-display').innerHTML = `Terkoneksi sebagai: <b>${newSession.user.email}</b>`;
                            document.getElementById('btn-save').disabled = false;
                        }
                    });
                }
            }
        });

        async function handleSetPassword(e) {
            e.preventDefault();
            
            const pwd1 = document.getElementById('new-password').value;
            const pwd2 = document.getElementById('confirm-password').value;

            if (pwd1 !== pwd2) {
                showToast("Peringatan", "Kata sandi dan konfirmasi kata sandi tidak cocok!", "error");
                return;
            }

            const btn = document.getElementById('btn-save');
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');

            btn.disabled = true;
            btnText.innerText = "Menyimpan...";
            btnIcon.className = "fa-solid fa-spinner fa-spin";

            // Update Password
            const { data, error } = await supabaseClient.auth.updateUser({ password: pwd1 });

            if (error) {
                showToast("Gagal", error.message, "error");
                btn.disabled = false;
                btnText.innerText = "Simpan Kata Sandi & Masuk";
                btnIcon.className = "fa-solid fa-arrow-right-to-bracket";
                return;
            }

            showToast("Sukses!", "Kata sandi berhasil dibuat. Mengalihkan ke sistem...", "success");

            // Routing otomatis sesuai role
            const { data: roleData } = await supabaseClient.from('user_roles').select('role').eq('user_id', data.user.id).single();
            
            setTimeout(() => {
                if (roleData && roleData.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'user-hub.html';
                }
            }, 2000);
        }
    </script>
</body>
</html>
