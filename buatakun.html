    <style>
        :root { 
            --primary: #0A3055;
            --primary-soft: #f0f4f8;
            --accent: #f59e0b;
            --accent-soft: #fffbeb;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --success: #10b981;
            --error: #ef4444;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        /* PAGE TRANSITION OVERLAY */
        .page-transition-overlay { position: fixed; inset: 0; background: var(--primary); z-index: 9999999; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: all 0.4s ease; }
        .page-transition-overlay.active { opacity: 1; visibility: visible; }
        .page-transition-overlay .spinner { width: 50px; height: 50px; border: 4px solid rgba(245, 158, 11, 0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* VIEW SECTION ENTRANCE ANIMATION */
        .view-section {
            display: none;
            animation: fadeSlideIn 0.45s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .view-section.active {
            display: block;
        }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* STAGGERED CARD ENTRANCE */
        .card-item {
            animation: cardFadeUp 0.5s ease-out forwards;
            opacity: 0;
        }
        .card-item:nth-child(1) { animation-delay: 0.05s; }
        .card-item:nth-child(2) { animation-delay: 0.1s; }
        .card-item:nth-child(3) { animation-delay: 0.15s; }
        .card-item:nth-child(4) { animation-delay: 0.2s; }
        .card-item:nth-child(5) { animation-delay: 0.25s; }
        .card-item:nth-child(6) { animation-delay: 0.3s; }
        @keyframes cardFadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        body { 
            background: var(--bg);
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow-x: hidden; 
        }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 12px; }
        .toast { 
            background: var(--surface); border-left: 4px solid var(--primary); 
            box-shadow: var(--shadow-md); padding: 14px 18px; 
            border-radius: var(--radius-sm); display: flex; align-items: center; gap: 12px; 
            min-width: 300px; transform: translateX(120%);
            animation: slideInToast 0.4s forwards, fadeOutToast 0.4s forwards 3.6s; 
        }
        .toast.error { border-left-color: var(--error); }
        .toast.success { border-left-color: var(--success); }
        .toast i { font-size: 1.1rem; }
        .toast.error i { color: var(--error); }
        .toast.success i { color: var(--success); }
        .toast-content { display: flex; flex-direction: column; }
        .toast-title { font-weight: 700; font-size: 0.9rem; color: var(--text); }
        .toast-message { font-size: 0.8rem; color: var(--text-secondary); }

        @keyframes slideInToast { to { transform: translateX(0); } }
        @keyframes fadeOutToast { to { opacity: 0; transform: translateY(-10px); visibility: hidden; } }

        .auth-container { 
            display: flex; width: 90%; max-width: 900px; min-height: 500px; 
            background: var(--surface);
            border-radius: var(--radius-lg); box-shadow: var(--shadow-md); 
            overflow: hidden; margin: 40px 0;
        }
        
        .brand-panel { 
            flex: 1; background: var(--primary); 
            color: white; padding: 50px; display: flex; flex-direction: column; 
            justify-content: center; position: relative; overflow: hidden;
            text-align: center;
        }
        .brand-panel h1 { font-size: 2.2rem; line-height: 1.2; margin-bottom: 15px; z-index: 2; position: relative;}
        .brand-panel h1 span { color: var(--accent); }
        
        .floating-icon { font-size: 3.5rem; color: var(--accent); margin-bottom: 20px; z-index: 2; position: relative; animation: float 3s ease-in-out infinite; }
        
        .form-panel { flex: 1.2; padding: 50px 40px; position: relative; display: flex; align-items: center; justify-content: center;}
        
        .form-wrapper { width: 100%; max-width: 400px; position: relative; z-index: 10;}
        .form-wrapper h2 { color: var(--primary); margin-bottom: 5px; font-size: 1.6rem; font-weight: 700; }
        .form-wrapper p.subtitle { color: var(--text-secondary); margin-bottom: 28px; font-size: 0.9rem; }
        
        .input-group { position: relative; margin-bottom: 18px; }
        .input-group i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); transition: 0.3s; font-size: 0.9rem; }
        .input-group input { width: 100%; padding: 12px 14px 12px 44px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 0.9rem; outline: none; transition: 0.2s; background: var(--bg);}
        .input-group input:focus { border-color: var(--primary); background: var(--surface); box-shadow: 0 0 0 3px rgba(10, 48, 85, 0.08);}
        .input-group input:focus + i { color: var(--primary); }

        .btn-primary { width: 100%; padding: 13px; background: var(--success); color: white; border: none; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.95rem; display: flex; justify-content: center; align-items: center; gap: 8px;}
        .btn-primary:hover { background: #059669; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        .btn-primary:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; transform: none; box-shadow: none; }
        
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-8px); } 100% { transform: translateY(0px); } }

        @media (max-width: 768px) {
            .auth-container { flex-direction: column; width: 95%; border-radius: var(--radius-md); }
            .brand-panel { padding: 32px 20px; border-radius: var(--radius-md) var(--radius-md) 0 0; }
            .form-panel { padding: 32px 20px; }
        }

<body>

    <div class="page-transition-overlay" id="pageTransitionOverlay"><div class="spinner"></div></div>

    <div id="toast-container"></div>

    <div class="auth-container">
        <div class="brand-panel">
            <img src="Logo Coreva removebg.png" alt="Coreva" style="height:60px; width:auto; object-fit:contain; margin-bottom:20px; z-index:2; position:relative; filter:drop-shadow(0 4px 8px rgba(0,0,0,0.3));">
            <h1>Verifikasi <br><span>Berhasil!</span></h1>
            <p style="z-index: 2; position: relative;">Satu langkah lagi. Silakan atur kata sandi untuk akun Anda agar dapat mengakses sistem Campus Innovate.</p>
        </div>

        <div class="form-panel">
            <div class="form-wrapper">
                <h2>Buat Kata Sandi 🔒</h2>
                <p class="subtitle" id="user-email-display">Menyiapkan pengaturan akun Anda...</p>
                <form onsubmit="handleSetPassword(event)">
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="new-password" placeholder="Kata Sandi Baru (Min. 6 Karakter)" required minlength="6">
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-key"></i>
                        <input type="password" id="confirm-password" placeholder="Konfirmasi Kata Sandi Baru" required minlength="6">
                    </div>

                    <button type="submit" class="btn-primary" id="btn-save">
                        <span id="btn-text">Simpan Kata Sandi & Masuk</span>
                        <i class="fa-solid fa-arrow-right-to-bracket" id="btn-icon"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://wnhftesxaicqffnyrdkn.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_i2-_17x_KOh0HxNw4DaaNA_vqXMBO2R'; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { global: { fetch: window.supabaseFetchFn } });

        function showToast(title, message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            let icon = type === 'error' ? 'fa-circle-exclamation' : 'fa-check-circle';
            toast.innerHTML = `<i class="fa-solid ${icon}"></i><div class="toast-content"><span class="toast-title">${title}</span><span class="toast-message">${message}</span></div>`;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 4000);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            // Ketika user klik link dari email OTP, Supabase otomatis memvalidasi hash di URL
            // dan langsung mengaktifkan session pengguna.
            
            // Cek apakah ada session aktif hasil dari klik link email
            const { data: { session } } = await supabaseClient.auth.getSession();
            
            if (session && session.user) {
                document.getElementById('user-email-display').innerHTML = `Terkoneksi sebagai: <b>${session.user.email}</b>`;
            } else {
                // Jika tidak ada session (link expired / dibuka manual tanpa token)
                const hash = window.location.hash;
                if (hash && hash.includes("error=access_denied")) {
                    showToast("Link Tidak Valid", "Link verifikasi telah kedaluwarsa atau tidak valid. Silakan hubungi admin.", "error");
                    document.getElementById('user-email-display').innerHTML = `<span style="color:var(--error);">Link kedaluwarsa. Silakan kembali ke halaman login.</span>`;
                    document.getElementById('btn-save').disabled = true;
                } else {
                    // Tunggu sesaat karena terkadang auth listener butuh waktu parse hash URL
                    supabaseClient.auth.onAuthStateChange((event, newSession) => {
                        if (event === 'SIGNED_IN' || event === 'PASSWORD_RECOVERY') {
                            document.getElementById('user-email-display').innerHTML = `Terkoneksi sebagai: <b>${newSession.user.email}</b>`;
                            document.getElementById('btn-save').disabled = false;
                        }
                    });
                }
            }
        });

        async function handleSetPassword(e) {
            e.preventDefault();
            
            const pwd1 = document.getElementById('new-password').value;
            const pwd2 = document.getElementById('confirm-password').value;

            if (pwd1 !== pwd2) {
                showToast("Peringatan", "Kata sandi dan konfirmasi kata sandi tidak cocok!", "error");
                return;
            }

            const btn = document.getElementById('btn-save');
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');

            btn.disabled = true;
            btnText.innerText = "Menyimpan...";
            btnIcon.className = "fa-solid fa-spinner fa-spin";

            // Update Password
            const { data, error } = await supabaseClient.auth.updateUser({ password: pwd1 });

            if (error) {
                showToast("Gagal", error.message, "error");
                btn.disabled = false;
                btnText.innerText = "Simpan Kata Sandi & Masuk";
                btnIcon.className = "fa-solid fa-arrow-right-to-bracket";
                return;
            }

            showToast("Sukses!", "Kata sandi berhasil dibuat. Mengalihkan ke sistem...", "success");

            // Routing otomatis sesuai role
            const { data: roleData } = await supabaseClient.from('user_roles').select('role').eq('user_id', data.user.id).single();
            
            setTimeout(() => {
                if (roleData && roleData.role === 'admin') {
                    navigateWithTransition('admin.html');
                } else {
                    navigateWithTransition('user-hub.html');
                }
            }, 2000);
        }
    </script>
<script src="ai-assistant.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    window.AI = AIAssistantCreate({
        pageName: 'buatakun',
        pageDescription: 'Halaman pendaftaran akun baru. Buat akun untuk bergabung dengan organisasi di Campus Innovate.',
        storageKey: 'ai_buatakun',
        welcomeMessage: '👋 Halo! Saya AI Assistant Coreva. Saya bisa bantu:<br><br>• <b>Buat password</b> — panduan password yang aman<br>• <b>Tips keamanan</b> — saran password kuat<br>• <b>Bantuan</b> — ketik "help" untuk panduan lengkap',
        supabase: supabaseClient,
        onGetQuickActions: () => [
            { id: 'help_password', label: 'Tips Password', icon: 'fa-solid fa-shield-keyhole' },
            { id: 'help_bantuan', label: 'Bantuan', icon: 'fa-solid fa-circle-question' },
        ],
        // Enhanced smart logic for registration page
        handleIntent: (intent, entities) => {
            const text = (entities.target || '').toLowerCase();
            
            if (intent === 'HELP' || intent === 'TOLONG' || text.includes('password') || text.includes('keamanan')) {
                return '🔐 <b>Tips Password Aman:</b><br>' +
                    '• Minimal 8 karakter (huruf besar, kecil, angka, simbol)<br>' +
                    '• Jangan gunakan info pribadi (nama, tgl lahir, nomor hp)<br>' +
                    '• Gunakan frasa acak: <i>"Bintang-Jatuh-7-Malam!"</i><br>' +
                    '• Jangan pakai password sama di situs lain<br>' +
                    '• Simpan di password manager (Bitwarden, 1Password, dll)';
            }
            
            if (intent === 'NAVIGATE' && (text.includes('login') || text.includes('masuk'))) {
                navigateWithTransition('index.html');
                return '👉 Mengalihkan ke halaman login...';
            }
            
            return null;
        },
        onQuickAction: (id, action) => {
            if (id === 'help_password') {
                return '🔐 <b>Tips Password Aman:</b><br>' +
                    '• Minimal 8 karakter (huruf besar, kecil, angka, simbol)<br>' +
                    '• Jangan gunakan info pribadi (nama, tgl lahir, nomor hp)<br>' +
                    '• Gunakan frasa acak: <i>"Bintang-Jatuh-7-Malam!"</i><br>' +
                    '• Jangan pakai password sama di situs lain<br>' +
                    '• Simpan di password manager (Bitwarden, 1Password, dll)';
            }
            if (id === 'help_bantuan') {
                return '💡 Ketik "help" untuk panduan lengkap, atau tanyakan langsung tentang pendaftaran.';
            }
            return null;
        },
        onExecuteAction: (type, target, data) => {
            if (type === 'help') {
                return '🔐 <b>Tips Password Aman:</b><br>• Min 8 karakter (huruf besar/kecil, angka, simbol)<br>• Hindari info pribadi<br>• Gunakan frasa acak unik<br>• Password manager direkomendasikan';
            }
            return null;
        },
    });
    AI.init();
});
function navigateWithTransition(url) {
    const overlay = document.getElementById('pageTransitionOverlay');
    if (overlay) { overlay.classList.add('active'); setTimeout(() => { window.location.href = url; }, 350); }
    else { window.location.href = url; }
}
function initPageTransition() {
    document.body.style.opacity = '0';
    requestAnimationFrame(() => { document.body.style.transition = 'opacity 0.4s ease'; document.body.style.opacity = '1'; });
}
document.addEventListener('DOMContentLoaded', initPageTransition);
</script>
</body>
